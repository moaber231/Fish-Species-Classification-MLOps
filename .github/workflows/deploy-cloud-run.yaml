name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'src/group_56/api.py'
      - 'dockerfiles/api.dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy-cloud-run.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: fish-classifier-api

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine auth mode
        id: auth-mode
        env:
          SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          has_wif="false"
          if [ -n "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ] && [ -n "${{ secrets.GCP_SERVICE_ACCOUNT }}" ]; then
            has_wif="true"
          fi

          has_key="false"
          if [ ${#SA_KEY} -gt 10 ]; then
            has_key="true"
          fi

          if [ "$has_wif" = "false" ] && [ "$has_key" = "false" ]; then
            echo "No auth secrets configured. Set either WIF (GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_SERVICE_ACCOUNT) or GCP_SA_KEY."
            exit 1
          fi

          echo "has_wif=$has_wif" >> $GITHUB_OUTPUT
          echo "has_key=$has_key" >> $GITHUB_OUTPUT

      # Prefer Workload Identity Federation when configured
      - name: Authenticate to Google Cloud (WIF)
        if: ${{ steps.auth-mode.outputs.has_wif == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # Fallback to service account JSON key when provided
      - name: Authenticate to Google Cloud (Key)
        if: ${{ steps.auth-mode.outputs.has_key == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build Docker image
        run: |
          docker build \
            -f dockerfiles/api.dockerfile \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image to GCR
        run: |
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 10 \
            --port 8080 \
            --concurrency 80 \
            --timeout 300 \
            --set-env-vars ENVIRONMENT=${{ github.event.inputs.environment || 'staging' }}

      - name: Get service URL
        id: get-url
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT
          echo "Service URL: $SERVICE_URL"

      - name: Run smoke tests
        run: |
          # Wait for service to be ready
          sleep 10

          # Test health endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.get-url.outputs.url }}/health)
          if [ "$response" != "200" ]; then
            echo "Health check failed with status $response"
            exit 1
          fi
          echo "✅ Health check passed"

          # Test root endpoint
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.get-url.outputs.url }}/)
          if [ "$response" != "200" ]; then
            echo "Root endpoint failed with status $response"
            exit 1
          fi
          echo "✅ Root endpoint passed"

      - name: Output deployment info
        run: |
          echo "🚀 Deployment successful!"
          echo "Service URL: ${{ steps.get-url.outputs.url }}"
          echo "Image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "Region: ${{ env.REGION }}"
